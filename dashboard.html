<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Mapick Cost Firewall</title></head>
<body style="font-family:system-ui;max-width:600px;margin:40px auto">
<h1>🛡️ Mapick Cost Firewall</h1>
<div id="stats" style="display:flex;gap:20px;margin:20px 0">
  <div style="background:#e8f5e9;padding:15px;border-radius:8px;flex:1"><div id="mode" style="font-size:24px;font-weight:bold">-</div><div>Mode</div></div>
  <div style="background:#fff3e0;padding:15px;border-radius:8px;flex:1"><div id="spent" style="font-size:24px;font-weight:bold">$0</div><div>Today Spent</div></div>
  <div style="background:#fce4ec;padding:15px;border-radius:8px;flex:1"><div id="blocked" style="font-size:24px;font-weight:bold">0</div><div>Blocked</div></div>
</div>
<div id="log" style="background:#f5f5f5;padding:15px;border-radius:8px;font-family:monospace;font-size:13px;max-height:300px;overflow:auto"></div>
<p style="color:#999;font-size:12px">Auto-refresh every 3s | <button onclick="stop()">⏹ Stop</button> <button onclick="resume()">▶ Resume</button></p>
<script>
const API = 'http://127.0.0.1:18789/mapick/api';
async function fetchData(){
  try{const r=await fetch(API+'/stats');const d=await r.json();
  document.getElementById('mode').textContent=d.mode; document.getElementById('mode').style.color=d.emergency_stop?'red':(d.mode=='protect'?'orange':'green');
  document.getElementById('spent').textContent='$'+d.today_spent.toFixed(4); document.getElementById('blocked').textContent=d.today_blocked;
  }catch(e){}
}
async function stop(){await fetch(API+'/stop');fetchData();}
async function resume(){await fetch(API+'/resume');fetchData();}
fetchData();setInterval(fetchData,3000);
</script>
</body>
</html>
